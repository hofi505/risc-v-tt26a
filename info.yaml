# Tiny Tapeout project information
project:
  title:        "8-bit RISC CPU"      # Project title
  author:       "Robert Vitaliani"      # Your name
  discord:      "prototype54321"      # Your discord username, for communication and automatically assigning you a Tapeout role (optional)
  description:  "8-bit RISC CPU with ALU, registers, data memory and external 16-bit instructions"      # One line description of what your project does
  language:     "Verilog" # other examples include SystemVerilog, Amaranth, VHDL, etc
  clock_hz:     5000000       # Clock frequency in Hz (or 0 if not applicable)

  # How many tiles your design occupies? A single tile is about 340x160 uM.
  tiles: "1x2"          # Valid values: 1x1, 1x2, 2x2, 3x2, 4x2, 3x4 or 4x4

  # Your top module name must start with "tt_um_". Make it unique by including your github username:
  top_module:  "tt_um_8bit_risc_cpu"

  # List your project's source files here.
  # Source files must be in ./src and you must list each source file separately, one per line.
  # Don't forget to also update `PROJECT_SOURCES` in test/Makefile.
  source_files:
    - "tt_um_8bit_risc_cpu.v"
    - "Adder.v"
    - "ALU.v"
    - "Branch_Control.v"
    - "Control_Unit.v"
    - "CPU_Core.v"
    - "Data_Memory.v"
    - "Imm_Gen.v"
    - "Mux1.v"
    - "PCplus4Adder.v"
    - "Program_Counter.v"
    - "Registers.v"

# The pinout of your project. Leave unused pins blank. DO NOT delete or add any pins.
# This section is for the datasheet/website. Use descriptive names (e.g., RX, TX, MOSI, SCL, SEG_A, etc.).
pinout:
  # Inputs
  ui[0]: "instruction[8]"
  ui[1]: "instruction[9]"
  ui[2]: "instruction[10]"
  ui[3]: "instruction[11]"
  ui[4]: "instruction[12]"
  ui[5]: "instruction[13]"
  ui[6]: "instruction[14]"
  ui[7]: "instruction[15]"

  # Outputs
  uo[0]: "CPU_Out[0]"
  uo[1]: "CPU_Out[1]"
  uo[2]: "CPU_Out[2]"
  uo[3]: "CPU_Out[3]"
  uo[4]: "CPU_Out[4]"
  uo[5]: "CPU_Out[5]"
  uo[6]: "CPU_Out[6]"
  uo[7]: "CPU_Out[7]"

  # Bidirectional pins
  uio[0]: "instruction[0]"
  uio[1]: "instruction[1]"
  uio[2]: "instruction[2]"
  uio[3]: "instruction[3]"
  uio[4]: "instruction[4]"
  uio[5]: "instruction[5]"
  uio[6]: "instruction[6]"
  uio[7]: "instruction[7]"

# Do not change!
yaml_version: 6
